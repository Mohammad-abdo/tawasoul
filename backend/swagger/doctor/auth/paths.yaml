/doctor/auth/register:
  post:
    tags: [Doctor Auth]
    summary: Register as a doctor
    operationId: doctorRegister
    security: []
    description: Doctor accounts require admin approval after registration (`isApproved` defaults to false).
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DoctorRegisterRequest"
    responses:
      "201":
        description: Registration submitted — pending admin approval
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    doctor:
                      $ref: "#/components/schemas/DoctorPublicProfile"
                    message:
                      type: string
                      example: Registration successful. Your account is pending admin approval.
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "409":
        description: Email already exists
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/doctor/auth/login:
  post:
    tags: [Doctor Auth]
    summary: Doctor login
    operationId: doctorLogin
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DoctorLoginRequest"
    responses:
      "200":
        description: Login successful
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/DoctorAuthResponse"
      "401":
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/doctor/auth/me:
  get:
    tags: [Doctor Auth]
    summary: Get current authenticated doctor
    operationId: doctorGetMe
    security:
      - BearerAuth: []
    responses:
      "200":
        description: Doctor profile with specialties, prices, and stats
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/DoctorFullProfile"

/doctor/auth/profile:
  put:
    tags: [Doctor Auth]
    summary: Update doctor profile
    operationId: doctorUpdateProfile
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DoctorUpdateProfileRequest"
    responses:
      "200":
        description: Profile updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/DoctorFullProfile"
