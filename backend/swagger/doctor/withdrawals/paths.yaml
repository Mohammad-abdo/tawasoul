/doctor/withdrawals:
  get:
    tags: [Doctor Withdrawals]
    summary: Get doctor's withdrawal requests
    operationId: getDoctorWithdrawals
    security:
      - BearerAuth: []
    responses:
      "200":
        description: List of withdrawal requests
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/Withdrawal"
  post:
    tags: [Doctor Withdrawals]
    summary: Request a withdrawal
    operationId: requestWithdrawal
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WithdrawalRequest"
    responses:
      "201":
        description: Withdrawal request created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Withdrawal"
      "400":
        description: Insufficient balance or validation error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
