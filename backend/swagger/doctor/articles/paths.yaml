/doctor/articles:
  get:
    tags: [Doctor Articles]
    summary: Get doctor's own articles
    operationId: getDoctorArticles
    security:
      - BearerAuth: []
    responses:
      "200":
        description: List of articles authored by this doctor
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/Article"
  post:
    tags: [Doctor Articles]
    summary: Create a new article
    operationId: createArticle
    security:
      - BearerAuth: []
    description: Content is moderated before publishing.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateArticleRequest"
    responses:
      "201":
        description: Article created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Article"
      "400":
        description: Validation or content moderation failure
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/doctor/articles/{id}:
  put:
    tags: [Doctor Articles]
    summary: Update an article
    operationId: updateArticle
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    description: Content is moderated before updating.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateArticleRequest"
    responses:
      "200":
        description: Article updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Article"
      "403":
        description: Not your article
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "404":
        description: Article not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
  delete:
    tags: [Doctor Articles]
    summary: Delete an article
    operationId: deleteArticle
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Article deleted
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"
      "403":
        description: Not your article
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

# User Articles (read-only, under /user namespace)
/user/articles:
  get:
    tags: [Doctor Articles]
    summary: Get all published articles (user view)
    operationId: getUserArticles
    security:
      - BearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
    responses:
      "200":
        description: Paginated article list
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    articles:
                      type: array
                      items:
                        $ref: "#/components/schemas/Article"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"

/user/articles/{id}:
  get:
    tags: [Doctor Articles]
    summary: Get article by ID (user view)
    operationId: getUserArticleById
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Article details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Article"
      "404":
        description: Article not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
