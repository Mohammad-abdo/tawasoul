/doctor/children:
  get:
    tags: [Doctor Children]
    summary: Get children assigned to this doctor (via bookings)
    operationId: getDoctorChildren
    security:
      - BearerAuth: []
    responses:
      "200":
        description: List of children with booking history
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/Child"

/doctor/children/{childId}:
  get:
    tags: [Doctor Children]
    summary: Get full child profile including assessment results
    operationId: getDoctorChildDetails
    security:
      - BearerAuth: []
    parameters:
      - name: childId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Child profile with assessment results
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/ChildWithAssessments"
      "403":
        description: No booking relationship with this child
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "404":
        description: Child not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

# Doctor can also access assessment endpoints (shared with user)
/doctor/assessments/tests:
  get:
    tags: [Doctor Children]
    summary: Get assessment tests (doctor access)
    operationId: getDoctorAssessmentTests
    security:
      - BearerAuth: []
    responses:
      "200":
        description: List of assessment tests
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/AssessmentTest"

/doctor/assessments/tests/{testId}/questions:
  get:
    tags: [Doctor Children]
    summary: Get test questions (doctor access)
    operationId: getDoctorTestQuestions
    security:
      - BearerAuth: []
    parameters:
      - name: testId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Questions for the test
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    test:
                      $ref: "#/components/schemas/AssessmentTest"
                    questionModel:
                      type: string
                      enum: [Q_CARS, Q_Analogy, Q_VisualMemory_Batch, Q_AuditoryMemory, HelpSkill]
                    questions:
                      type: array
                      items:
                        $ref: "#/components/schemas/AssessmentQuestion"

/doctor/assessments/submit-result:
  post:
    tags: [Doctor Children]
    summary: Submit assessment result for a child (doctor)
    operationId: doctorSubmitAssessmentResult
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubmitAssessmentResultRequest"
    responses:
      "201":
        description: Result submitted
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    result:
                      $ref: "#/components/schemas/AssessmentResult"
                    helpAssessment:
                      allOf:
                        - $ref: "#/components/schemas/HelpAssessment"
                      nullable: true
                    recommendation:
                      $ref: "#/components/schemas/AssessmentRecommendation"
