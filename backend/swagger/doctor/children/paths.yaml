/doctor/children:
  get:
    tags: [Doctor Children]
    summary: Get children assigned to this doctor (via bookings)
    operationId: getDoctorChildren
    security:
      - BearerAuth: []
    responses:
      "200":
        description: List of children with booking history
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/Child"

/doctor/children/{childId}:
  get:
    tags: [Doctor Children]
    summary: Get full child profile including assessment results
    operationId: getDoctorChildDetails
    security:
      - BearerAuth: []
    parameters:
      - name: childId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Child profile with assessment results
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/ChildWithAssessments"
      "403":
        description: No booking relationship with this child
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "404":
        description: Child not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
