Payment:
  type: object
  properties:
    id:
      type: string
      format: uuid
    packageId:
      type: string
      format: uuid
    doctorId:
      type: string
      format: uuid
    amount:
      type: number
      format: float
    method:
      type: string
      enum: [BANK_ACCOUNT, E_WALLET, PAYPAL, VODAFONE_CASH, FAWRY, INSTAPAY]
    status:
      type: string
      enum: [PENDING, COMPLETED, FAILED, REFUNDED]
    transactionId:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

DoctorEarnings:
  type: object
  properties:
    totalEarnings:
      type: number
      format: float
    completedPayments:
      type: integer
    pendingPayments:
      type: integer
    thisMonthEarnings:
      type: number
      format: float
    availableBalance:
      type: number
      format: float
