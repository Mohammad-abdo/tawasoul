/doctor/payments:
  get:
    tags: [Doctor Payments]
    summary: Get doctor's payment history
    operationId: getDoctorPayments
    security:
      - BearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
    responses:
      "200":
        description: Paginated payment history
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    payments:
                      type: array
                      items:
                        $ref: "#/components/schemas/Payment"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"

/doctor/earnings:
  get:
    tags: [Doctor Payments]
    summary: Get doctor's earnings summary
    operationId: getDoctorEarnings
    security:
      - BearerAuth: []
    responses:
      "200":
        description: Earnings breakdown
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/DoctorEarnings"
