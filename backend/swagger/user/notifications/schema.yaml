Notification:
  type: object
  properties:
    id:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    type:
      type: string
      enum:
        - BOOKING_CONFIRMED
        - BOOKING_CANCELLED
        - NEW_MESSAGE
        - NEW_COMMENT
        - NEW_LIKE
        - PAYMENT_RECEIVED
        - TIP_ADDED
    title:
      type: string
    message:
      type: string
    isRead:
      type: boolean
    data:
      type: object
      nullable: true
      description: Additional JSON data related to the notification
    createdAt:
      type: string
      format: date-time
