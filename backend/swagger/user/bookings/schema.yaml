BookingPaymentSummary:
  type: object
  nullable: true
  properties:
    id:
      type: string
      format: uuid
    status:
      type: string
      enum: [PENDING, COMPLETED, FAILED, REFUNDED]
    method:
      type: string
      enum: [BANK_ACCOUNT, E_WALLET, PAYPAL, VODAFONE_CASH, FAWRY, INSTAPAY]
    amount:
      type: number
      format: float
    transactionId:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time

BookingSummary:
  type: object
  properties:
    id:
      type: string
      format: uuid
    doctor:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        specialization:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        rating:
          type: number
        isVerified:
          type: boolean
    sessionType:
      type: string
      enum: [VIDEO, AUDIO, TEXT]
    duration:
      type: integer
      enum: [30, 45, 60]
    price:
      type: number
      format: float
    status:
      type: string
      enum: [PENDING, CONFIRMED, COMPLETED, CANCELLED]
    scheduledAt:
      type: string
      format: date-time
    completedAt:
      type: string
      format: date-time
      nullable: true
    cancelledAt:
      type: string
      format: date-time
      nullable: true
    rating:
      type: integer
      nullable: true
    review:
      type: string
      nullable: true
    payment:
      $ref: "#/components/schemas/BookingPaymentSummary"
    createdAt:
      type: string
      format: date-time

BookingDetail:
  allOf:
    - $ref: "#/components/schemas/BookingSummary"
    - type: object
      properties:
        childId:
          type: string
          nullable: true
        child:
          nullable: true
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            profileImage:
              type: string
              nullable: true
        cancellationReason:
          type: string
          nullable: true
        videoLink:
          type: string
          nullable: true
        scheduledMonth:
          type: integer
          nullable: true
        scheduledDay:
          type: integer
          nullable: true
        scheduledTime:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time

BookingCreatedResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    doctor:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        specialization:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
    sessionType:
      type: string
      enum: [VIDEO, AUDIO, TEXT]
    duration:
      type: integer
    price:
      type: number
    status:
      type: string
      example: PENDING
    scheduledAt:
      type: string
      format: date-time
    createdAt:
      type: string
      format: date-time

CreateBookingRequest:
  type: object
  required: [doctorId, sessionType, duration]
  properties:
    doctorId:
      type: string
      format: uuid
    childId:
      type: string
      format: uuid
      nullable: true
    sessionType:
      type: string
      enum: [VIDEO, AUDIO, TEXT]
    duration:
      type: integer
      enum: [30, 45, 60]
      description: Session duration in minutes
    scheduledAt:
      type: string
      format: date-time
      description: Full ISO datetime (alternative to month/day/time)
    scheduledMonth:
      type: integer
      minimum: 1
      maximum: 12
      description: Used together with scheduledDay and scheduledTime
    scheduledDay:
      type: integer
      minimum: 1
      maximum: 31
    scheduledTime:
      type: string
      description: "Format: HH:MM AM/PM"
      example: "10:00 AM"
    notes:
      type: string
      nullable: true

RescheduleBookingRequest:
  type: object
  properties:
    scheduledAt:
      type: string
      format: date-time
    scheduledMonth:
      type: integer
      minimum: 1
      maximum: 12
    scheduledDay:
      type: integer
      minimum: 1
      maximum: 31
    scheduledTime:
      type: string
      example: "02:30 PM"
