Product:
  type: object
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    nameAr:
      type: string
    description:
      type: string
      nullable: true
    descriptionAr:
      type: string
      nullable: true
    images:
      type: array
      items:
        type: string
      description: Array of image URLs (stored as JSON string)
    price:
      type: number
      format: float
    priceBeforeDiscount:
      type: number
      format: float
      nullable: true
    discount:
      type: number
      format: float
      nullable: true
    rating:
      type: number
      format: float
    totalRatings:
      type: integer
    stock:
      type: integer
    isActive:
      type: boolean
    isFeatured:
      type: boolean
    category:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time

ProductReview:
  type: object
  properties:
    id:
      type: string
      format: uuid
    productId:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    rating:
      type: integer
      minimum: 1
      maximum: 5
    comment:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time

CartItem:
  type: object
  properties:
    id:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    productId:
      type: string
      format: uuid
    product:
      $ref: "#/components/schemas/Product"
    quantity:
      type: integer
      minimum: 1
    createdAt:
      type: string
      format: date-time

OrderItem:
  type: object
  properties:
    id:
      type: string
      format: uuid
    productId:
      type: string
      format: uuid
    product:
      $ref: "#/components/schemas/Product"
    quantity:
      type: integer
    price:
      type: number
      format: float

Order:
  type: object
  properties:
    id:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    orderNumber:
      type: string
      example: ORD-20260307-0001
    subtotal:
      type: number
      format: float
    total:
      type: number
      format: float
    status:
      type: string
      enum: [PENDING, CONFIRMED, PROCESSING, SHIPPED, DELIVERED, CANCELLED]
    paymentMethod:
      type: string
      nullable: true
      enum: [BANK_ACCOUNT, E_WALLET, PAYPAL, VODAFONE_CASH, FAWRY, INSTAPAY]
    paymentStatus:
      type: string
      enum: [PENDING, COMPLETED, FAILED, REFUNDED]
    items:
      type: array
      items:
        $ref: "#/components/schemas/OrderItem"
    address:
      nullable: true
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        fullAddress:
          type: string
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
