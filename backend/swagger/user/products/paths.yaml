# Products, Cart, and Orders

/user/products:
  get:
    tags: [User Products & Store]
    summary: Get all active products
    operationId: getProducts
    security: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
      - name: category
        in: query
        schema:
          type: string
      - name: search
        in: query
        schema:
          type: string
    responses:
      "200":
        description: Paginated product list
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    products:
                      type: array
                      items:
                        $ref: "#/components/schemas/Product"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"

/user/products/{id}:
  get:
    tags: [User Products & Store]
    summary: Get product by ID
    operationId: getProductById
    security: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Product details with reviews
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Product"
      "404":
        description: Product not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/products/{id}/reviews:
  post:
    tags: [User Products & Store]
    summary: Add a review for a product
    operationId: addProductReview
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [rating]
            properties:
              rating:
                type: integer
                minimum: 1
                maximum: 5
              comment:
                type: string
                nullable: true
    responses:
      "201":
        description: Review added
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/ProductReview"
      "409":
        description: Already reviewed this product
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/cart:
  get:
    tags: [User Products & Store]
    summary: Get user's cart
    operationId: getCart
    security:
      - BearerAuth: []
    responses:
      "200":
        description: Cart items
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    items:
                      type: array
                      items:
                        $ref: "#/components/schemas/CartItem"
                    total:
                      type: number
  post:
    tags: [User Products & Store]
    summary: Add item to cart
    operationId: addToCart
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [productId]
            properties:
              productId:
                type: string
                format: uuid
              quantity:
                type: integer
                minimum: 1
                default: 1
    responses:
      "201":
        description: Item added to cart
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/CartItem"
  delete:
    tags: [User Products & Store]
    summary: Clear entire cart
    operationId: clearCart
    security:
      - BearerAuth: []
    responses:
      "200":
        description: Cart cleared
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"

/user/cart/{id}:
  put:
    tags: [User Products & Store]
    summary: Update cart item quantity
    operationId: updateCartItem
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [quantity]
            properties:
              quantity:
                type: integer
                minimum: 1
    responses:
      "200":
        description: Cart item updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/CartItem"
  delete:
    tags: [User Products & Store]
    summary: Remove item from cart
    operationId: removeFromCart
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Item removed
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"

/user/orders:
  get:
    tags: [User Products & Store]
    summary: Get user's orders
    operationId: getUserOrders
    security:
      - BearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
    responses:
      "200":
        description: Paginated order list
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    orders:
                      type: array
                      items:
                        $ref: "#/components/schemas/Order"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"
  post:
    tags: [User Products & Store]
    summary: Create order from cart
    operationId: createOrder
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              addressId:
                type: string
                format: uuid
              paymentMethod:
                type: string
                enum: [BANK_ACCOUNT, E_WALLET, PAYPAL, VODAFONE_CASH, FAWRY, INSTAPAY]
    responses:
      "201":
        description: Order created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Order"

/user/orders/{id}:
  get:
    tags: [User Products & Store]
    summary: Get order by ID
    operationId: getOrderById
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Order details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Order"

/user/orders/{id}/cancel:
  put:
    tags: [User Products & Store]
    summary: Cancel an order
    operationId: cancelOrder
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Order cancelled
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"
