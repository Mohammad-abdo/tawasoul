MaharaActivityImage:
  type: object
  properties:
    id:
      type: string
      format: uuid
    sortOrder:
      type: integer
    url:
      type: string
      description: Full URL to image asset

MaharaActivityAudio:
  type: object
  properties:
    id:
      type: string
      format: uuid
    sortOrder:
      type: integer
    url:
      type: string
      description: Full URL to audio asset

MaharaActivityForUser:
  type: object
  properties:
    id:
      type: string
      format: uuid
    type:
      type: string
      enum: [LISTEN_WATCH, LISTEN_CHOOSE_IMAGE, MATCHING, SEQUENCE_ORDER, AUDIO_ASSOCIATION]
    levelOrder:
      type: integer
    skillGroup:
      nullable: true
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          nullable: true
          type: object
          properties:
            id:
              type: string
            name:
              type: string
    images:
      type: array
      items:
        $ref: "#/components/schemas/MaharaActivityImage"
    audios:
      type: array
      items:
        $ref: "#/components/schemas/MaharaActivityAudio"

SubmitActivityRequest:
  type: object
  required: [childId, activityId]
  properties:
    childId:
      type: string
      format: uuid
    activityId:
      type: string
      format: uuid
    event:
      type: string
      enum: [audio_completed]
      description: Required for LISTEN_WATCH and AUDIO_ASSOCIATION types
    selectedImageId:
      type: string
      format: uuid
      description: Required for LISTEN_CHOOSE_IMAGE type
    matches:
      type: array
      description: Required for MATCHING type
      items:
        type: object
        required: [imageId, audioId]
        properties:
          imageId:
            type: string
            format: uuid
          audioId:
            type: string
            format: uuid
    sequence:
      type: array
      description: Required for SEQUENCE_ORDER type — ordered list of imageIds
      items:
        type: string
        format: uuid

ActivitySubmitResponse:
  type: object
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        completed:
          type: boolean
        correct:
          type: boolean
        nextActivity:
          nullable: true
          $ref: "#/components/schemas/MaharaActivityForUser"
        incorrectPairs:
          type: array
          description: Only present on MATCHING failure
          items:
            type: object
            properties:
              imageId:
                type: string
              audioId:
                type: string
        message:
          type: string
          description: Present when all activities are done
          example: All activities completed
