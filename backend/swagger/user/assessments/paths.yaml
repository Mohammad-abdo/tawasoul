/user/assessments/tests:
  get:
    tags: [User Assessments]
    summary: List assessment tests
    description: Returns user-facing assessment test summaries without question payloads.
    parameters:
      - name: testType
        in: query
        required: false
        schema:
          type: string
          enum: [CARS, ANALOGY, VISUAL_MEMORY, AUDITORY_MEMORY, HELP, SOUND_DISCRIMINATION, PRONUNCIATION_REPETITION, SOUND_IMAGE_LINKING, SEQUENCE_ORDER]
    responses:
      "200":
        description: Test summaries
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/TestSummary"
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/assessments/tests/{testId}:
  get:
    tags: [User Assessments]
    summary: Get test detail
    description: Loads a full assessment test record and its question payloads before the child starts the test.
    parameters:
      - name: testId
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Full test payload
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/TestDetail"
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "404":
        description: Test not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/assessments/cars/submit:
  post:
    tags: [User Assessments]
    summary: Submit CARS answers
    description: Validates child ownership, validates the test type, scores each answer from the selected choice score, then writes the AssessmentResult and Q_CARS_Answer rows in one transaction.
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubmitCARSBody"
    responses:
      "201":
        description: CARS assessment submitted
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    assessmentResultId:
                      type: string
                    totalScore:
                      type: integer
                    maxScore:
                      type: integer
                    answers:
                      type: array
                      items:
                        type: object
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "403":
        description: Child does not belong to the authenticated user
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "404":
        description: Test not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "422":
        description: Wrong test type, invalid question, or chosenIndex out of bounds
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

