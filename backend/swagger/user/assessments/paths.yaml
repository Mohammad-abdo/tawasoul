/user/assessments/tests:
  get:
    tags: [User Assessments]
    summary: Get all assessment tests
    operationId: getAssessmentTests
    security: []
    responses:
      "200":
        description: List of tests grouped by category
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/AssessmentTest"

/user/assessments/tests/{testId}/questions:
  get:
    tags: [User Assessments]
    summary: Get questions for a specific test
    operationId: getTestQuestions
    security: []
    parameters:
      - name: testId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Test with its questions
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    test:
                      $ref: "#/components/schemas/AssessmentTest"
                    questions:
                      type: array
                      items:
                        $ref: "#/components/schemas/AssessmentQuestion"
      "404":
        description: Test not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/assessments/submit-result:
  post:
    tags: [User Assessments]
    summary: Submit assessment result for a child
    operationId: submitAssessmentResult
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubmitAssessmentResultRequest"
    responses:
      "201":
        description: Result submitted
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AssessmentResult"
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
