/user/assessments/results/{childId}:
  get:
    tags: [User Assessments]
    summary: List child assessment results
    description: Returns the authenticated user's child assessment results grouped by testType without answer breakdowns.
    security:
      - BearerAuth: []
    parameters:
      - name: childId
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Grouped assessment result summaries
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      testType:
                        type: string
                      results:
                        type: array
                        items:
                          $ref: "#/components/schemas/AssessmentResultSummary"
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "403":
        description: Child does not belong to the authenticated user
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/assessments/results/{childId}/{sessionId}:
  get:
    tags: [User Assessments]
    summary: Get one assessment session detail
    description: Returns the full session breakdown for the authenticated user's child, including the answer relation that matches the session's testType.
    security:
      - BearerAuth: []
    parameters:
      - name: childId
        in: path
        required: true
        schema:
          type: string
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Assessment session detail
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    childId:
                      type: string
                    sessionId:
                      type: string
                    results:
                      type: array
