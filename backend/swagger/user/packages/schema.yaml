Package:
  type: object
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    nameAr:
      type: string
    description:
      type: string
      nullable: true
    descriptionAr:
      type: string
      nullable: true
    price:
      type: number
      format: float
    sessionsCount:
      type: integer
      description: Number of sessions included
    durationMonths:
      type: integer
      description: Package validity in months
    content:
      type: object
      nullable: true
      description: Additional package content (JSON)
    isActive:
      type: boolean
    isFeatured:
      type: boolean
    createdAt:
      type: string
      format: date-time

UserPackage:
  type: object
  properties:
    id:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    packageId:
      type: string
      format: uuid
    package:
      $ref: "#/components/schemas/Package"
    status:
      type: string
      enum: [ACTIVE, EXPIRED, CANCELLED]
    sessionsUsed:
      type: integer
    sessionsRemaining:
      type: integer
    startDate:
      type: string
      format: date-time
    endDate:
      type: string
      format: date-time
    createdAt:
      type: string
      format: date-time
