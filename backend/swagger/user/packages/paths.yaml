/user/packages:
  get:
    tags: [User Packages]
    summary: Get all available packages
    operationId: getPackages
    security: []
    responses:
      "200":
        description: List of active packages
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/Package"

/user/packages/active:
  get:
    tags: [User Packages]
    summary: Get user's currently active package
    operationId: getActivePackage
    security:
      - BearerAuth: []
    responses:
      "200":
        description: Active user package or null
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/UserPackage"

/user/packages/my-packages:
  get:
    tags: [User Packages]
    summary: Get all user packages (history)
    operationId: getUserPackages
    security:
      - BearerAuth: []
    responses:
      "200":
        description: User's package history
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/UserPackage"

/user/packages/{id}:
  get:
    tags: [User Packages]
    summary: Get package details by ID
    operationId: getPackageById
    security: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Package details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Package"
      "404":
        description: Package not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/packages/purchase:
  post:
    tags: [User Packages]
    summary: Purchase a package
    operationId: purchasePackage
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [packageId]
            properties:
              packageId:
                type: string
                format: uuid
              paymentMethod:
                type: string
                enum: [BANK_ACCOUNT, E_WALLET, PAYPAL, VODAFONE_CASH, FAWRY, INSTAPAY]
    responses:
      "201":
        description: Package purchased
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/UserPackage"
      "404":
        description: Package not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
