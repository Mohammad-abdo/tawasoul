/user/children:
  get:
    tags: [User Children]
    summary: Get all children for authenticated user
    operationId: getUserChildren
    security:
      - BearerAuth: []
    responses:
      "200":
        description: List of child profiles
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    children:
                      type: array
                      items:
                        $ref: "#/components/schemas/Child"
  post:
    tags: [User Children]
    summary: Create a new child profile
    operationId: createChild
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateChildRequest"
    responses:
      "201":
        description: Child profile created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    child:
                      $ref: "#/components/schemas/Child"
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/children/survey:
  post:
    tags: [User Children]
    summary: Submit child survey after registration
    operationId: submitChildSurvey
    security:
      - BearerAuth: []
    description: |
      Accepts both Arabic text and enum values for `status` and `ageGroup`:
      - `status`: `"توحد"` or `"AUTISM"` | `"تخاطب"` or `"SPEECH_DISORDER"`
      - `ageGroup`: `"اقل من 4 سنوات"` or `"UNDER_4"` | `"4 سنوات الي 15 سنه"` or `"BETWEEN_5_15"` | `"اكبر من 15 سنه"` or `"OVER_15"`
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ChildSurveyRequest"
    responses:
      "201":
        description: Survey submitted
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                data:
                  type: object
                  properties:
                    child:
                      $ref: "#/components/schemas/Child"
                    surveyCompleted:
                      type: boolean
                      example: true
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/children/{id}:
  get:
    tags: [User Children]
    summary: Get child profile by ID
    operationId: getChildById
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Child profile with last 5 bookings
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    child:
                      $ref: "#/components/schemas/ChildWithBookings"
      "403":
        description: Forbidden — not your child
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "404":
        description: Child not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
  put:
    tags: [User Children]
    summary: Update child profile
    operationId: updateChild
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateChildRequest"
    responses:
      "200":
        description: Child profile updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    child:
                      $ref: "#/components/schemas/Child"
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "404":
        description: Child not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
  delete:
    tags: [User Children]
    summary: Delete child profile
    operationId: deleteChild
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Child deleted
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "404":
        description: Child not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
