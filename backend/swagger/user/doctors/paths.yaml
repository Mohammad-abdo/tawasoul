/user/doctors:
  get:
    tags: [User Doctors]
    summary: Get all active approved doctors
    operationId: getUserDoctors
    security:
      - BearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
      - name: specialty
        in: query
        schema:
          type: string
        description: Filter by specialty keyword
      - name: rating
        in: query
        schema:
          type: number
        description: Minimum rating filter
      - name: price
        in: query
        schema:
          type: number
        description: Maximum session price filter
      - name: sort
        in: query
        schema:
          type: string
          enum: [rating, sessions, newest]
          default: rating
      - name: search
        in: query
        schema:
          type: string
        description: Search by name, specialization, or bio
      - name: recommendedForChildId
        in: query
        schema:
          type: string
          format: uuid
        description: Filter doctors matched to a child's condition
    responses:
      "200":
        description: Paginated list of doctors
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    doctors:
                      type: array
                      items:
                        $ref: "#/components/schemas/DoctorSummary"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"

/user/doctors/{id}:
  get:
    tags: [User Doctors]
    summary: Get full doctor profile by ID
    operationId: getUserDoctorById
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Full doctor profile
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/DoctorDetail"
      "404":
        description: Doctor not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/doctors/{id}/available-slots:
  get:
    tags: [User Doctors]
    summary: Get doctor's available time slots for a date
    operationId: getDoctorAvailableSlots
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
      - name: date
        in: query
        required: true
        schema:
          type: string
          format: date
          example: "2026-03-15"
        description: Date in YYYY-MM-DD format
    responses:
      "200":
        description: Available time slots for the given date
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    slots:
                      type: array
                      items:
                        $ref: "#/components/schemas/AvailableSlot"
                    date:
                      type: string
                      format: date
      "400":
        description: Missing or invalid date parameter
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
