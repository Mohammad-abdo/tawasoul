/public/faqs:
  get:
    tags: [Public]
    summary: Get all FAQs
    operationId: getPublicFAQs
    security: []
    parameters:
      - name: category
        in: query
        schema:
          type: string
        description: Filter by FAQ category
    responses:
      "200":
        description: List of active FAQs
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/FAQ"
