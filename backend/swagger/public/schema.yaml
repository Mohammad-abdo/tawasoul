PageContent:
  type: object
  properties:
    id:
      type: string
      format: uuid
    pageType:
      type: string
      enum: [PRIVACY_POLICY, TERMS_AND_CONDITIONS, ABOUT_APP, COMMUNITY_GUIDELINES, HELP_CENTER]
    titleAr:
      type: string
    titleEn:
      type: string
      nullable: true
    contentAr:
      type: string
    contentEn:
      type: string
      nullable: true
    updatedAt:
      type: string
      format: date-time

StaticPage:
  type: object
  properties:
    id:
      type: string
      format: uuid
    pageType:
      type: string
      enum: [HOME_PAGE_1, HOME_PAGE_2, ABOUT_APP, FAQ, PRIVACY_POLICY, TERMS_AND_CONDITIONS, COMPANY_SECTOR]
    titleAr:
      type: string
    titleEn:
      type: string
      nullable: true
    contentAr:
      type: string
    contentEn:
      type: string
      nullable: true
    image:
      type: string
      nullable: true
    isActive:
      type: boolean
    updatedAt:
      type: string
      format: date-time

OnboardingSlide:
  type: object
  properties:
    id:
      type: string
      format: uuid
    title:
      type: string
    titleAr:
      type: string
    description:
      type: string
      nullable: true
    descriptionAr:
      type: string
      nullable: true
    image:
      type: string
      nullable: true
      description: Full URL to slide image
    order:
      type: integer
    platform:
      type: string
      enum: [ALL, IOS, ANDROID]
    isActive:
      type: boolean

HomeSliderItem:
  type: object
  properties:
    id:
      type: string
      format: uuid
    titleAr:
      type: string
    titleEn:
      type: string
      nullable: true
    descriptionAr:
      type: string
      nullable: true
    descriptionEn:
      type: string
      nullable: true
    image:
      type: string
      description: Full image URL
    buttonText:
      type: string
      nullable: true
    buttonLink:
      type: string
      nullable: true
    order:
      type: integer

HomeServiceItem:
  type: object
  properties:
    id:
      type: string
      format: uuid
    titleAr:
      type: string
    titleEn:
      type: string
      nullable: true
    descriptionAr:
      type: string
      nullable: true
    image:
      type: string
    link:
      type: string
      nullable: true
    order:
      type: integer

HomeArticleItem:
  type: object
  properties:
    id:
      type: string
      format: uuid
    titleAr:
      type: string
    titleEn:
      type: string
      nullable: true
    descriptionAr:
      type: string
      nullable: true
    image:
      type: string
    link:
      type: string
      nullable: true
    order:
      type: integer

HomePageData:
  type: object
  properties:
    sliders:
      type: array
      items:
        $ref: "#/components/schemas/HomeSliderItem"
    services:
      type: array
      items:
        $ref: "#/components/schemas/HomeServiceItem"
    articles:
      type: array
      items:
        $ref: "#/components/schemas/HomeArticleItem"

FAQ:
  type: object
  properties:
    id:
      type: string
      format: uuid
    questionAr:
      type: string
    questionEn:
      type: string
      nullable: true
    answerAr:
      type: string
    answerEn:
      type: string
      nullable: true
    category:
      type: string
      nullable: true
    order:
      type: integer
    isActive:
      type: boolean
