/admin/bookings:
  get:
    tags: [Admin Bookings]
    summary: Get all bookings
    operationId: adminGetAllBookings
    security:
      - BearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
      - name: status
        in: query
        schema:
          type: string
          enum: [PENDING, CONFIRMED, COMPLETED, CANCELLED]
      - name: doctorId
        in: query
        schema:
          type: string
          format: uuid
      - name: userId
        in: query
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Paginated booking list
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    bookings:
                      type: array
                      items:
                        $ref: "#/components/schemas/AdminBooking"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"

/admin/bookings/{id}:
  get:
    tags: [Admin Bookings]
    summary: Get booking by ID
    operationId: adminGetBookingById
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Booking details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AdminBooking"

/admin/bookings/{id}/status:
  put:
    tags: [Admin Bookings]
    summary: Update booking status
    operationId: adminUpdateBookingStatus
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [status]
            properties:
              status:
                type: string
                enum: [PENDING, CONFIRMED, COMPLETED, CANCELLED]
    responses:
      "200":
        description: Status updated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"

/admin/bookings/{id}/cancel:
  put:
    tags: [Admin Bookings]
    summary: Cancel a booking
    operationId: adminCancelBooking
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              reason:
                type: string
    responses:
      "200":
        description: Booking cancelled
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"
