/admin/coupons:
  get:
    tags: [Admin Coupons]
    summary: Get all coupons
    operationId: adminGetAllCoupons
    security:
      - BearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
    responses:
      "200":
        description: Paginated coupon list
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    coupons:
                      type: array
                      items:
                        $ref: "#/components/schemas/Coupon"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"
  post:
    tags: [Admin Coupons]
    summary: Create a coupon
    operationId: adminCreateCoupon
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateCouponRequest"
    responses:
      "201":
        description: Coupon created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Coupon"

/admin/coupons/{id}:
  get:
    tags: [Admin Coupons]
    summary: Get coupon by ID
    operationId: adminGetCouponById
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Coupon details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Coupon"
  put:
    tags: [Admin Coupons]
    summary: Update a coupon
    operationId: adminUpdateCoupon
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateCouponRequest"
    responses:
      "200":
        description: Coupon updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Coupon"
  delete:
    tags: [Admin Coupons]
    summary: Delete a coupon
    operationId: adminDeleteCoupon
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Coupon deleted
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"

/admin/coupons/{id}/usage:
  get:
    tags: [Admin Coupons]
    summary: Get coupon usage statistics
    operationId: adminGetCouponUsage
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Coupon usage stats
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    usedCount:
                      type: integer
                    usageLimit:
                      type: integer
                      nullable: true
                    users:
                      type: array
                      items:
                        type: object
                        properties:
                          userId:
                            type: string
                          usedAt:
                            type: string
                            format: date-time

/admin/coupons/{id}/activate:
  put:
    tags: [Admin Coupons]
    summary: Activate a coupon
    operationId: adminActivateCoupon
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Coupon activated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"

/admin/coupons/{id}/deactivate:
  put:
    tags: [Admin Coupons]
    summary: Deactivate a coupon
    operationId: adminDeactivateCoupon
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Coupon deactivated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"
