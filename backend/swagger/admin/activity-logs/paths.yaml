/admin/activity-logs:
  get:
    tags: [Admin Activity Logs]
    summary: Get all activity logs
    operationId: adminGetActivityLogs
    security:
      - BearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
      - name: adminId
        in: query
        schema:
          type: string
      - name: action
        in: query
        schema:
          type: string
          example: CREATE
      - name: entityType
        in: query
        schema:
          type: string
          example: USER
      - name: entityId
        in: query
        schema:
          type: string
      - name: dateFrom
        in: query
        schema:
          type: string
          format: date-time
      - name: dateTo
        in: query
        schema:
          type: string
          format: date-time
      - name: sort
        in: query
        schema:
          type: string
          default: createdAt
    responses:
      "200":
        description: Activity logs list
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    logs:
                      type: array
                      items:
                        $ref: "#/components/schemas/ActivityLog"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"

/admin/activity-logs/stats:
  get:
    tags: [Admin Activity Logs]
    summary: Get activity log statistics
    operationId: adminGetActivityStats
    security:
      - BearerAuth: []
    parameters:
      - name: dateFrom
        in: query
        schema:
          type: string
          format: date-time
      - name: dateTo
        in: query
        schema:
          type: string
          format: date-time
    responses:
      "200":
        description: Activity statistics
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    totalLogs:
                      type: integer
                    logsByAction:
                      type: array
                      items:
                        type: object
                        properties:
                          action:
                            type: string
                          _count:
                            type: integer
                    logsByEntityType:
                      type: array
                      items:
                        type: object
                        properties:
                          entityType:
                            type: string
                          _count:
                            type: integer
                    logsByAdmin:
                      type: array
                      items:
                        type: object
                        properties:
                          adminId:
                            type: string
                          _count:
                            type: integer

/admin/activity-logs/export:
  get:
    tags: [Admin Activity Logs]
    summary: Export activity logs
    operationId: adminExportActivityLogs
    security:
      - BearerAuth: []
    parameters:
      - name: format
        in: query
        schema:
          type: string
          enum: [JSON, CSV]
          default: JSON
      - name: dateFrom
        in: query
        schema:
          type: string
          format: date-time
      - name: dateTo
        in: query
        schema:
          type: string
          format: date-time
    responses:
      "200":
        description: Exported file
        content:
          application/json:
            schema:
              type: object
          text/csv:
            schema:
              type: string

/admin/activity-logs/{id}:
  get:
    tags: [Admin Activity Logs]
    summary: Get activity log by ID
    operationId: adminGetActivityLogById
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Activity log details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/ActivityLog"
