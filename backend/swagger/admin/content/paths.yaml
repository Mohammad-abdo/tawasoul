/admin/home-sliders:
  get:
    tags: [Admin Content]
    summary: Get all home sliders
    operationId: adminGetHomeSliders
    security:
      - BearerAuth: []
    parameters:
      - name: isActive
        in: query
        schema:
          type: boolean
    responses:
      "200":
        description: Home sliders list
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/HomeSlider"
  post:
    tags: [Admin Content]
    summary: Create home slider
    operationId: adminCreateHomeSlider
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: "#/components/schemas/HomeSliderRequest"
    responses:
      "201":
        description: Slider created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/HomeSlider"

/admin/home-sliders/reorder:
  post:
    tags: [Admin Content]
    summary: Reorder home sliders
    operationId: adminReorderHomeSliders
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [items]
            properties:
              items:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    order:
                      type: integer
    responses:
      "200":
        description: Sliders reordered
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"

