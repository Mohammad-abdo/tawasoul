/admin/pages:
  get:
    tags: [Admin Content]
    summary: Get all static pages
    operationId: adminGetAllPages
    security:
      - BearerAuth: []
    description: |
      Returns all pages, auto-creating missing required pages with default content.
      Required page types: PRIVACY_POLICY, TERMS_AND_CONDITIONS, ABOUT_APP, COMMUNITY_GUIDELINES, HELP_CENTER.
    responses:
      "200":
        description: Pages list
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    pages:
                      type: array
                      items:
                        $ref: "#/components/schemas/AdminPageContent"

/admin/pages/initialize:
  post:
    tags: [Admin Content]
    summary: Initialize missing pages
    operationId: adminInitializePages
    security:
      - BearerAuth: []
    responses:
      "200":
        description: Missing pages created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                data:
                  type: object
                  properties:
                    createdPages:
                      type: array
                      items:
                        $ref: "#/components/schemas/AdminPageContent"

/admin/pages/{pageType}:
  get:
    tags: [Admin Content]
    summary: Get page by type
    operationId: adminGetPageByType
    security:
      - BearerAuth: []
    parameters:
      - name: pageType
        in: path
        required: true
        schema:
          type: string
          enum: [PRIVACY_POLICY, TERMS_AND_CONDITIONS, ABOUT_APP, COMMUNITY_GUIDELINES, HELP_CENTER]
    responses:
      "200":
        description: Page content
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AdminPageContent"
  put:
    tags: [Admin Content]
    summary: Update page content
    operationId: adminUpdatePageContent
    security:
      - BearerAuth: []
    description: Creates the page if it doesn't exist.
    parameters:
      - name: pageType
        in: path
        required: true
        schema:
          type: string
          enum: [PRIVACY_POLICY, TERMS_AND_CONDITIONS, ABOUT_APP, COMMUNITY_GUIDELINES, HELP_CENTER]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
              titleAr:
                type: string
              content:
                type: string
              contentAr:
                type: string
    responses:
      "200":
        description: Page updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AdminPageContent"
