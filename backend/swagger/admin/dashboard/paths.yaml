/admin/dashboard:
  get:
    tags: [Admin Dashboard]
    summary: Get platform statistics
    operationId: getDashboardStats
    security:
      - BearerAuth: []
    responses:
      "200":
        description: Dashboard statistics
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/DashboardStats"

/admin/dashboard/analytics:
  get:
    tags: [Admin Dashboard]
    summary: Get detailed analytics
    operationId: getDashboardAnalytics
    security:
      - BearerAuth: []
    parameters:
      - name: period
        in: query
        schema:
          type: string
          enum: [7d, 30d, 90d, 1y]
          default: 30d
    responses:
      "200":
        description: Analytics data
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/DashboardAnalytics"
