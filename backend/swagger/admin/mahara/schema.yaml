ActivityCategory:
  type: object
  properties:
    id:
      type: string
    name:
      type: string
    createdAt:
      type: string
      format: date-time

SkillGroup:
  type: object
  properties:
    id:
      type: string
    name:
      type: string
    categoryId:
      type: string
    category:
      $ref: "#/components/schemas/ActivityCategory"
    createdAt:
      type: string
      format: date-time

AdminActivityImage:
  type: object
  properties:
    id:
      type: string
    activityId:
      type: string
    assetPath:
      type: string
    url:
      type: string
      description: Full URL to image file
    sortOrder:
      type: integer

AdminActivityAudio:
  type: object
  properties:
    id:
      type: string
    activityId:
      type: string
    assetPath:
      type: string
    url:
      type: string
      description: Full URL to audio file
    sortOrder:
      type: integer

AdminActivityMatchPair:
  type: object
  properties:
    id:
      type: string
    activityId:
      type: string
    imageId:
      type: string
    audioId:
      type: string

AdminActivitySequenceItem:
  type: object
  properties:
    id:
      type: string
    activityId:
      type: string
    imageId:
      type: string
    position:
      type: integer

AdminActivity:
  type: object
  properties:
    id:
      type: string
    skillGroupId:
      type: string
    skillGroup:
      $ref: "#/components/schemas/SkillGroup"
    type:
      type: string
      enum: [LISTEN_WATCH, AUDIO_ASSOCIATION, LISTEN_CHOOSE_IMAGE, MATCHING, SEQUENCE_ORDER]
    levelOrder:
      type: integer
    correctImageId:
      type: string
      nullable: true
    images:
      type: array
      items:
        $ref: "#/components/schemas/AdminActivityImage"
    audios:
      type: array
      items:
        $ref: "#/components/schemas/AdminActivityAudio"
    matchPairs:
      type: array
      items:
        $ref: "#/components/schemas/AdminActivityMatchPair"
    sequenceItems:
      type: array
      items:
        $ref: "#/components/schemas/AdminActivitySequenceItem"
    createdAt:
      type: string
      format: date-time
