Report:
  type: object
  properties:
    id:
      type: string
    type:
      type: string
      example: USERS
    name:
      type: string
    description:
      type: string
      nullable: true
    format:
      type: string
      enum: [JSON, CSV, PDF]
    filters:
      type: object
      nullable: true
    status:
      type: string
      enum: [PENDING, PROCESSING, COMPLETED, FAILED]
    filePath:
      type: string
      nullable: true
    fileUrl:
      type: string
      nullable: true
    generatedBy:
      type: string
    generatedByAdmin:
      type: object
      nullable: true
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
    startedAt:
      type: string
      format: date-time
      nullable: true
    completedAt:
      type: string
      format: date-time
      nullable: true
    createdAt:
      type: string
      format: date-time

GenerateReportRequest:
  type: object
  required: [type, name]
  properties:
    type:
      type: string
      example: USERS
      description: Report type (e.g. USERS, DOCTORS, BOOKINGS, PAYMENTS)
    name:
      type: string
      example: Monthly Users Report
    description:
      type: string
      nullable: true
    format:
      type: string
      enum: [JSON, CSV, PDF]
      default: JSON
    filters:
      type: object
      description: Optional filter parameters specific to the report type
      example:
        dateFrom: "2024-01-01"
        dateTo: "2024-12-31"
