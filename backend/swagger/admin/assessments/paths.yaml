/admin/assessment-categories:
  get:
    tags: [Admin Assessments]
    summary: Get all assessment categories
    operationId: adminGetAssessmentCategories
    security:
      - BearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
    responses:
      "200":
        description: Assessment categories list
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    categories:
                      type: array
                      items:
                        $ref: "#/components/schemas/AdminAssessmentCategory"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"
  post:
    tags: [Admin Assessments]
    summary: Create assessment category
    operationId: adminCreateAssessmentCategory
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, nameAr]
            properties:
              name:
                type: string
              nameAr:
                type: string
    responses:
      "201":
        description: Category created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AdminAssessmentCategory"

/admin/assessment-categories/{id}:
  get:
    tags: [Admin Assessments]
    summary: Get assessment category by ID
    operationId: adminGetAssessmentCategoryById
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Category details with tests
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AdminAssessmentCategory"
  put:
    tags: [Admin Assessments]
    summary: Update assessment category
    operationId: adminUpdateAssessmentCategory
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              nameAr:
                type: string
    responses:
      "200":
        description: Category updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AdminAssessmentCategory"
  delete:
    tags: [Admin Assessments]
    summary: Delete assessment category
    operationId: adminDeleteAssessmentCategory
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Category deleted
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"

