/admin/assessments/tests/{testId}/questions:
  get:
    tags: [Admin Assessments]
    summary: Get question payloads for a test
    operationId: adminGetTestQuestions
    security:
      - BearerAuth: []
    parameters:
      - name: testId
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Test metadata and specialized question payloads
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    test:
                      $ref: "#/components/schemas/AdminTest"
                    questionModel:
                      type: string
                      enum: [Q_CARS, Q_Analogy, Q_VisualMemory_Batch, Q_AuditoryMemory, HelpSkill]
                    questions:
                      type: array
                      items:
                        $ref: "#/components/schemas/AdminQuestion"
  post:
    tags: [Admin Assessments]
    summary: Create a question payload for a test
    operationId: adminCreateQuestion
    security:
      - BearerAuth: []
    parameters:
      - name: testId
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminCreateQuestionRequest"
        multipart/form-data:
          schema:
            $ref: "#/components/schemas/AdminCreateQuestionRequest"
    responses:
      "201":
        description: Question payload created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AdminQuestion"

/admin/assessments/questions/{id}:
  get:
