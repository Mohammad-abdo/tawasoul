/admin/assessments/tests/{testId}/questions:
  get:
    tags: [Admin Assessments]
    summary: Get questions for a test
    operationId: adminGetTestQuestions
    security:
      - BearerAuth: []
    parameters:
      - name: testId
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Test questions
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/AdminQuestion"
  post:
    tags: [Admin Assessments]
    summary: Create question for a test
    operationId: adminCreateQuestion
    security:
      - BearerAuth: []
    description: |
      Accepts multipart/form-data. At least one media file (audio or image) is required.
    parameters:
      - name: testId
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              scoringGuide:
                type: string
              orderIndex:
                type: integer
              maxScore:
                type: integer
              choices:
                type: string
                description: JSON-encoded choices array
              audio:
                type: string
                format: binary
              image:
                type: string
                format: binary
    responses:
      "201":
        description: Question created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AdminQuestion"

