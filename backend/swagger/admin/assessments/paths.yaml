          schema:
            type: object
            properties:
              title:
                type: string
              titleAr:
                type: string
              type:
                type: string
                enum: [AUDITORY, VISUAL]
              testType:
                type: string
                enum: [CARS, ANALOGY, VISUAL_MEMORY, AUDITORY_MEMORY, HELP, SOUND_DISCRIMINATION, PRONUNCIATION_REPETITION, SOUND_IMAGE_LINKING, SEQUENCE_ORDER]
