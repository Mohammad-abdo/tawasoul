/admin/assessments/tests/{testId}/questions/{questionId}:
  delete:
    tags: [Admin Assessments]
    summary: Delete test question
    description: Deletes one question by `questionId` within the context of `testId`. The test's `testType` determines which underlying Prisma model is used. Visual memory uses the batch delete endpoint instead.
    security:
      - BearerAuth: []
    parameters:
      - name: testId
        in: path
        required: true
        schema:
          type: string
      - name: questionId
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Question deleted
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "404":
        description: Test or question not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "422":
        description: Wrong test type for question delete
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

