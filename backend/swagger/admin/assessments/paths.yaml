/admin/assessments/test-categories:
  get:
    tags: [Admin Assessments]
    summary: Get all test categories
    operationId: adminGetTestCategories
    security:
      - BearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
    responses:
      "200":
        description: Test categories list
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    testCategories:
                      type: array
                      items:
                        $ref: "#/components/schemas/AdminTestCategory"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"
  post:
    tags: [Admin Assessments]
    summary: Create test category
    operationId: adminCreateTestCategory
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, nameAr]
            properties:
              name:
                type: string
              nameAr:
                type: string
    responses:
      "201":
        description: Category created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AdminTestCategory"

/admin/assessments/test-categories/{id}:
  get:
    tags: [Admin Assessments]
    summary: Get test category by ID
    operationId: adminGetTestCategoryById
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Category details with tests
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AdminTestCategory"
  put:
    tags: [Admin Assessments]
    summary: Update test category
    operationId: adminUpdateTestCategory
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              nameAr:
                type: string
    responses:
      "200":
        description: Category updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AdminTestCategory"
  delete:
    tags: [Admin Assessments]
    summary: Delete test category
    operationId: adminDeleteTestCategory
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Category deleted
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"

/admin/assessments/tests:
  get:
    tags: [Admin Assessments]
    summary: Get all tests
    operationId: adminGetAllTests
    security:
      - BearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
      - name: testCategoryId
        in: query
        schema:
          type: string
      - name: testType
        in: query
        schema:
          type: string
          enum: [CARS, ANALOGY, VISUAL_MEMORY, AUDITORY_MEMORY, HELP]
    responses:
      "200":
        description: Tests list
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    tests:
                      type: array
                      items:
                        $ref: "#/components/schemas/AdminTest"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"
  post:
    tags: [Admin Assessments]
    summary: Create test
    operationId: adminCreateTest
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateTestRequest"
    responses:
      "201":
        description: Test created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AdminTest"

