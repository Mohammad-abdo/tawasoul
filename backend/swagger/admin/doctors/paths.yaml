/admin/doctors:
  get:
    tags: [Admin Doctors]
    summary: Get all doctors
    operationId: adminGetAllDoctors
    security:
      - BearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
      - name: search
        in: query
        schema:
          type: string
      - name: isApproved
        in: query
        schema:
          type: boolean
      - name: isVerified
        in: query
        schema:
          type: boolean
      - name: isActive
        in: query
        schema:
          type: boolean
    responses:
      "200":
        description: Paginated doctor list
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    doctors:
                      type: array
                      items:
                        $ref: "#/components/schemas/DoctorFullProfile"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"
  post:
    tags: [Admin Doctors]
    summary: Create a doctor account
    operationId: adminCreateDoctor
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DoctorRegisterRequest"
    responses:
      "201":
        description: Doctor created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/DoctorFullProfile"

/admin/doctors/{id}:
  get:
    tags: [Admin Doctors]
    summary: Get doctor by ID
    operationId: adminGetDoctorById
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Doctor details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/DoctorFullProfile"
  put:
    tags: [Admin Doctors]
    summary: Update a doctor
    operationId: adminUpdateDoctor
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DoctorUpdateProfileRequest"
    responses:
      "200":
        description: Doctor updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/DoctorFullProfile"
  delete:
    tags: [Admin Doctors]
    summary: Delete a doctor
    operationId: adminDeleteDoctor
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Doctor deleted
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"

