AdminUser:
  type: object
  properties:
    id:
      type: string
    name:
      type: string
    email:
      type: string
      format: email
    role:
      type: string
      enum: [SUPER_ADMIN, ADMIN, MODERATOR, SUPPORT]
    isActive:
      type: boolean
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

CreateAdminRequest:
  type: object
  required: [name, email, password]
  properties:
    name:
      type: string
    email:
      type: string
      format: email
    password:
      type: string
      format: password
    role:
      type: string
      enum: [SUPER_ADMIN, ADMIN, MODERATOR, SUPPORT]
      default: ADMIN
    isActive:
      type: boolean
      default: true

UpdateAdminRequest:
  type: object
  properties:
    name:
      type: string
    email:
      type: string
      format: email
    role:
      type: string
      enum: [SUPER_ADMIN, ADMIN, MODERATOR, SUPPORT]
    isActive:
      type: boolean
