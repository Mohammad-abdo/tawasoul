/agora/token:
  post:
    tags: [Realtime Sessions]
    summary: Generate Agora RTC token
    description: |
      Generates an Agora RTC token for a confirmed booking session.
      The authenticated requester must be either the booking user or doctor.
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AgoraTokenRequest'
    responses:
      '200':
        description: Agora token generated successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgoraTokenResponse'
      '400':
        description: Validation error or booking is not confirmed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Requester is not a participant in the booking
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Booking not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
