openapi: 3.0.3
info:
  title: Tawasoul API
  description: |
    Backend API for **Tawasoul (تواصل)** — Autism & Speech Disorder Therapy Application.

    Connects parents/caregivers to specialist therapists. Provides community features,
    e-commerce, child assessments, and sequential educational activities (Mahara Kids).

    ## Authentication
    Use the **Authorize** button to set your Bearer token.
    - **User token**: from `POST /user/auth/login` or `POST /user/auth/verify-otp`
    - **Doctor token**: from `POST /doctor/auth/login`
    - **Admin token**: from `POST /admin/auth/login`

    ## OTP Test Mode
    In development, OTP is always `12345` and is returned in the API response.
    Disable with `OTP_TEST_MODE=false` in production.
  version: 1.0.0
  contact:
    name: Qeema Tech

servers:
  - url: https://jadwa.developteam.site/api
    description: Production server
  - url: http://localhost:5000/api
    description: Local development server

