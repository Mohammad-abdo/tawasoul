AvailabilityEntry:
  type: object
  properties:
    id:
      type: string
      format: uuid
    dayOfWeek:
      type: integer
      description: "0=Sunday, 1=Monday, 2=Tuesday, 3=Wednesday, 4=Thursday, 5=Friday, 6=Saturday"
      minimum: 0
      maximum: 6
    timeSlots:
      type: array
      items:
        type: string
        example: "09:00 AM"
    isActive:
      type: boolean
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

AvailabilityEntryRequest:
  type: object
  required: [dayOfWeek, timeSlots]
  properties:
    dayOfWeek:
      type: integer
      minimum: 0
      maximum: 6
      description: "0=Sunday … 6=Saturday"
    timeSlots:
      type: array
      items:
        type: string
        example: "10:00 AM"
      description: Array of time strings
    isActive:
      type: boolean
      default: true
