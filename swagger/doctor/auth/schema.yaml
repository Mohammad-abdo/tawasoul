DoctorRegisterRequest:
  type: object
  required: [name, email, phone, password]
  properties:
    name:
      type: string
      example: Dr. Amira Hassan
    email:
      type: string
      format: email
    phone:
      type: string
    password:
      type: string
      minLength: 6
    specialization:
      type: string
      nullable: true

DoctorLoginRequest:
  type: object
  required: [email, password]
  properties:
    email:
      type: string
      format: email
    password:
      type: string

DoctorPublicProfile:
  type: object
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    email:
      type: string
      format: email
    phone:
      type: string
    specialization:
      type: string
      nullable: true
    isActive:
      type: boolean
    isApproved:
      type: boolean
    createdAt:
      type: string
      format: date-time

DoctorFullProfile:
  allOf:
    - $ref: "#/components/schemas/DoctorPublicProfile"
    - type: object
      properties:
        bio:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        rating:
          type: number
          format: float
        totalSessions:
          type: integer
        totalRatings:
          type: integer
        isVerified:
          type: boolean
        isFeatured:
          type: boolean
        specialties:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              specialty:
                type: string
        # sessionPrices:
        #   type: array
        #   items:
        #     $ref: "#/components/schemas/SessionPrice"
        updatedAt:
          type: string
          format: date-time

DoctorAuthResponse:
  type: object
  properties:
    doctor:
      $ref: "#/components/schemas/DoctorFullProfile"
    token:
      type: string
      example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

DoctorUpdateProfileRequest:
  type: object
  properties:
    name:
      type: string
    phone:
      type: string
    specialization:
      type: string
    bio:
      type: string
      nullable: true
    avatar:
      type: string
      nullable: true
    specialties:
      type: array
      items:
        type: string
      description: Replaces all existing specialties
    
