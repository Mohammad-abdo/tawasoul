DoctorMessage:
  type: object
  properties:
    id:
      type: string
      format: uuid
    conversationId:
      type: string
      format: uuid
    senderId:
      type: string
      format: uuid
    senderRole:
      type: string
      enum: [USER, DOCTOR]
    content:
      type: string
      nullable: true
    messageType:
      type: string
      enum: [TEXT, IMAGE, VIDEO, FILE, VOICE]
    imageUrl:
      type: string
      nullable: true
    videoUrl:
      type: string
      nullable: true
    fileUrl:
      type: string
      nullable: true
    fileName:
      type: string
      nullable: true
    voiceUrl:
      type: string
      nullable: true
    voiceDuration:
      type: integer
      nullable: true
      description: Voice duration in seconds
    isRead:
      type: boolean
    createdAt:
      type: string
      format: date-time

DoctorConversation:
  type: object
  properties:
    id:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    doctorId:
      type: string
      format: uuid
    updatedAt:
      type: string
      format: date-time
    user:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        username:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
    messages:
      type: array
      items:
        $ref: "#/components/schemas/DoctorMessage"
      description: Last message (take: 1)

Pagination:
  type: object
  properties:
    page:
      type: integer
    limit:
      type: integer
    total:
      type: integer
    pages:
      type: integer

DoctorSendMessageRequest:
  type: object
  required: [userId]
  properties:
    userId:
      type: string
      format: uuid
    messageType:
      type: string
      enum: [TEXT, IMAGE, VIDEO, FILE, VOICE]
      default: TEXT
    content:
      type: string
      description: Required for TEXT messages
    imageUrl:
      type: string
    videoUrl:
      type: string
    fileUrl:
      type: string
    fileName:
      type: string
    voiceUrl:
      type: string
    voiceDuration:
      type: integer