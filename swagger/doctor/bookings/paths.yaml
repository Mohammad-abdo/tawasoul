/doctor/bookings:
  get:
    tags: [Doctor Bookings]
    summary: Get doctor's bookings
    operationId: getDoctorBookings
    security:
      - BearerAuth: []
    parameters:
      - name: status
        in: query
        schema:
          type: string
          enum: [PENDING, CONFIRMED, COMPLETED, CANCELLED]
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
    responses:
      "200":
        description: Paginated booking list
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    bookings:
                      type: array
                      items:
                        $ref: "#/components/schemas/DoctorBookingSummary"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"

/doctor/bookings/{id}:
  get:
    tags: [Doctor Bookings]
    summary: Get booking details by ID
    operationId: getDoctorBookingById
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Full booking details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/DoctorBookingDetail"
      "403":
        description: Not your booking
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "404":
        description: Booking not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/doctor/bookings/{id}/confirm:
  put:
    tags: [Doctor Bookings]
    summary: Confirm a pending booking
    operationId: confirmDoctorBooking
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    description: Creates a BOOKING_CONFIRMED notification for the user.
    responses:
      "200":
        description: Booking confirmed
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    id:
                      type: string
                    status:
                      type: string
                      example: CONFIRMED
      "400":
        description: Only pending bookings can be confirmed
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/doctor/bookings/{id}/cancel:
  put:
    tags: [Doctor Bookings]
    summary: Cancel a booking
    operationId: cancelDoctorBooking
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              reason:
                type: string
    responses:
      "200":
        description: Booking cancelled. User receives BOOKING_CANCELLED notification.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    id:
                      type: string
                    status:
                      type: string
                      example: CANCELLED
                    cancelledAt:
                      type: string
                      format: date-time

/doctor/bookings/{id}/complete:
  put:
    tags: [Doctor Bookings]
    summary: Mark booking as completed
    operationId: completeDoctorBooking
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              notes:
                type: string
              rating:
                type: integer
                minimum: 1
                maximum: 5
    responses:
      "200":
        description: Booking completed
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/DoctorBookingDetail"
