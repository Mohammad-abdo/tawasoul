Message:
  type: object
  properties:
    id:
      type: string
      format: uuid
    senderId:
      type: string
      format: uuid
    receiverId:
      type: string
      format: uuid
    content:
      type: string
      nullable: true
    messageType:
      type: string
      enum: [TEXT, IMAGE, VIDEO, FILE, VOICE]
    imageUrl:
      type: string
      nullable: true
    videoUrl:
      type: string
      nullable: true
    fileUrl:
      type: string
      nullable: true
    fileName:
      type: string
      nullable: true
    voiceUrl:
      type: string
      nullable: true
    voiceDuration:
      type: integer
      nullable: true
      description: Voice duration in seconds
    isRead:
      type: boolean
    createdAt:
      type: string
      format: date-time

Conversation:
  type: object
  properties:
    userId:
      type: string
      format: uuid
    username:
      type: string
      nullable: true
    fullName:
      type: string
      nullable: true
    avatar:
      type: string
      nullable: true
    lastMessage:
      $ref: "#/components/schemas/Message"
    unreadCount:
      type: integer

SendMessageRequest:
  type: object
  required: [doctorId, content]
  properties:
    doctorId:
      type: string
      format: uuid
    messageType:
      type: string
      enum: [TEXT, IMAGE, VIDEO, FILE, VOICE]
      default: TEXT
    content:
      type: string
      description: Required for TEXT messages
    imageUrl:
      type: string
    videoUrl:
      type: string
    fileUrl:
      type: string
    fileName:
      type: string
    voiceUrl:
      type: string
    voiceDuration:
      type: integer
