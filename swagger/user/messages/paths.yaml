/user/messages/conversations:
  get:
    tags: [User Messages]
    summary: Get all conversations (inbox)
    operationId: getUserConversations
    security:
      - BearerAuth: []
    responses:
      "200":
        description: List of conversations
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    conversations:
                      type: array
                      items:
                        $ref: "#/components/schemas/Conversation"

/user/messages/send:
  post:
    tags: [User Messages]
    summary: Send a direct message
    operationId: sendMessage
    security:
      - BearerAuth: []
    description: Content is moderated before sending. Supports TEXT, IMAGE, VIDEO, FILE, and VOICE.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SendMessageRequest"
    responses:
      "201":
        description: Message sent
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Message"

/user/messages/conversations/{userId}:
  get:
    tags: [User Messages]
    summary: Get messages in a conversation with a specific user
    operationId: getConversation
    security:
      - BearerAuth: []
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The other user's ID
    responses:
      "200":
        description: Messages in conversation
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    messages:
                      type: array
                      items:
                        $ref: "#/components/schemas/Message"
