/user/address:
  get:
    tags: [User Addresses]
    summary: Get all addresses for authenticated user
    operationId: getUserAddresses
    security:
      - BearerAuth: []
    responses:
      "200":
        description: List of user addresses
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    addresses:
                      type: array
                      items:
                        $ref: "#/components/schemas/UserAddress"
                    pagination:
                      $ref: "#/components/schemas/PaginationMeta"
  post:
    tags: [User Addresses]
    summary: Create a new address
    operationId: createAddress
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateUserAddressRequest"
    responses:
      "201":
        description: Address created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    address:
                      $ref: "#/components/schemas/UserAddress"
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/address/{id}:
  get:
    tags: [User Addresses]
    summary: Get address by ID
    operationId: getAddressById
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Address details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    address:
                      $ref: "#/components/schemas/UserAddress"
      "403":
        description: Forbidden — not your address
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "404":
        description: Address not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
  put:
    tags: [User Addresses]
    summary: Update an address
    operationId: updateAddress
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateUserAddressRequest"
    responses:
      "200":
        description: Address updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    address:
                      $ref: "#/components/schemas/UserAddress"
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "404":
        description: Address not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
  delete:
    tags: [User Addresses]
    summary: Delete an address
    operationId: deleteAddress
    security:
      - BearerAuth: []
    parameters:
      - $ref: "#/components/schemas/IdPathParam"
    responses:
      "200":
        description: Address deleted
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "404":
        description: Address not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
