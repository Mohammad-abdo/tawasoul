IdPathParam:
  name: id
  in: path
  required: true
  schema:
    type: string
    format: uuid

Child:
  type: object
  properties:
    id:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    name:
      type: string
      example: Mohamed
    gender:
      type: string
      enum: [MALE, FEMALE]
      nullable: true
    age:
      type: integer
      nullable: true
    status:
      type: string
      nullable: true
      enum:
        - AUTISM
        - SPEECH_DISORDER
        - BEHAVIOR_MODIFICATION
        - LEARNING_DIFFICULTIES
        - SKILLS_DEVELOPMENT
        - PSYCHOLOGICAL_TESTS
        - DOWN_SYNDROME
        - COCHLEAR_IMPLANTS
        - OTHER
    ageGroup:
      type: string
      nullable: true
      enum: [UNDER_4, BETWEEN_5_15, OVER_15]
    behavioralNotes:
      type: string
      nullable: true
      maxLength: 250
    caseDescription:
      type: string
      nullable: true
    caseHistory:
      type: string
      nullable: true
    profileImage:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

ChildWithBookings:
  allOf:
    - $ref: "#/components/schemas/Child"
    - type: object
      properties:
        bookings:
          type: array
          description: Last 5 bookings
          items:
            type: object
            properties:
              id:
                type: string
              status:
                type: string
              scheduledYear:
                type: integer
                nullable: true
              scheduledMonth:
                type: integer
                nullable: true
              scheduledDay:
                type: integer
                nullable: true
              scheduledTime:
                type: string
                nullable: true

CreateChildRequest:
  type: object
  required: [name, status, ageGroup]
  properties:
    name:
      type: string
      example: Mohamed
    status:
      type: string
      enum: [AUTISM, SPEECH_DISORDER]
      description: Only AUTISM and SPEECH_DISORDER accepted in direct creation
    ageGroup:
      type: string
      enum: [UNDER_4, BETWEEN_5_15, OVER_15]
    behavioralNotes:
      type: string
      nullable: true
    caseDescription:
      type: string
      nullable: true
    profileImage:
      type: string
      nullable: true
      description: Image URL

UpdateChildRequest:
  type: object
  properties:
    name:
      type: string
    status:
      type: string
      enum: [AUTISM, SPEECH_DISORDER]
    ageGroup:
      type: string
      enum: [UNDER_4, BETWEEN_5_15, OVER_15]
    behavioralNotes:
      type: string
      nullable: true
    caseDescription:
      type: string
      nullable: true
    profileImage:
      type: string
      nullable: true

ChildSurveyRequest:
  type: object
  required: [status, ageGroup]
  properties:
    name:
      type: string
      description: Optional — defaults to "طفل N" if not provided
    status:
      type: string
      description: Arabic text or enum value
      example: توحد
    ageGroup:
      type: string
      description: Arabic text or enum value
      example: اقل من 4 سنوات
    behavioralNotes:
      type: string
      nullable: true
      maxLength: 250
