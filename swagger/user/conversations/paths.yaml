/user/conversations:
  get:
    tags: [User Conversations]
    summary: Get all conversations (inbox)
    operationId: getUserConversations
    security:
      - BearerAuth: []
    parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
    responses:
      "200":
        description: List of conversations
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    conversations:
                      type: array
                      items:
                        $ref: "#/components/schemas/Conversation"
                    pagination:
                      $ref: "#/components/schemas/Pagination"

  post:
    tags: [User Conversations]
    summary: Create a new conversation with a doctor
    operationId: createConversation
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - doctorId
            properties:
              doctorId:
                type: string
                format: uuid
                description: The doctor ID to start a conversation with
    responses:
      "201":
        description: Conversation created (or existing one returned)
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Conversation"
      "400":
        description: Bad request
      "404":
        description: Doctor not found

/user/conversations/{conversationId}:
  get:
    tags: [User Conversations]
    summary: Get messages in a specific conversation
    operationId: getConversationMessages
    security:
      - BearerAuth: []
    parameters:
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The conversation ID
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
    responses:
      "200":
        description: Messages in conversation
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    conversationId:
                      type: string
                      format: uuid
                    messages:
                      type: array
                      items:
                        $ref: "#/components/schemas/Message"
                    pagination:
                      $ref: "#/components/schemas/Pagination"
  delete:
    tags: [User Conversations]
    summary: Delete a conversation by ID
    operationId: deleteConversation
    security:
      - BearerAuth: []
    parameters:
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The conversation ID
    responses:
      "200":
        description: Conversation deleted
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    message:
                      type: string
      "403":
        description: Forbidden
      "404":
        description: Not found

/user/conversations/{conversationId}/details:
  get:
    tags: [User Conversations]
    summary: Get a single conversation by ID with full details
    operationId: getConversationById
    security:
      - BearerAuth: []
    parameters:
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The conversation ID
    responses:
      "200":
        description: Conversation details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/Conversation"
      "403":
        description: Forbidden
      "404":
        description: Not found
