/user/auth/register:
  post:
    tags: [User Auth]
    summary: Register with username and password
    operationId: userRegister
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserRegisterRequest"
    responses:
      "201":
        description: User registered successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  $ref: "#/components/schemas/UserAuthResponse"
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "409":
        description: Username or email already exists
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/auth/login:
  post:
    tags: [User Auth]
    summary: Login with username and password
    operationId: userLogin
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserLoginRequest"
    responses:
      "200":
        description: Login successful
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/UserAuthResponse"
      "401":
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
      "403":
        description: Account disabled or pending approval
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/auth/me:
  get:
    tags: [User Auth]
    summary: Get current authenticated user
    operationId: userGetMe
    security:
      - BearerAuth: []
    responses:
      "200":
        description: Current user profile
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/UserProfile"
      "401":
        $ref: "#/components/schemas/ErrorResponse"

/user/auth/send-otp:
  post:
    tags: [User Auth]
    summary: Send OTP to phone number (mobile primary flow)
    operationId: sendOTP
    security: []
    description: |
      Sends a one-time password to the given phone number.
      - If user exists → login flow
      - If user does not exist → registration flow (requires `fullName`)

      **Test Mode**: OTP is always `12345` and is returned in the response body.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SendOTPRequest"
    responses:
      "200":
        description: OTP sent
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOTPResponse"
      "400":
        description: Validation error or terms not accepted
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/auth/verify-otp:
  post:
    tags: [User Auth]
    summary: Verify OTP and authenticate user
    operationId: verifyOTP
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/VerifyOTPRequest"
    responses:
      "200":
        description: OTP verified — returns JWT token
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/OTPAuthResponse"
      "400":
        description: Invalid or expired OTP
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/auth/resend-otp:
  post:
    tags: [User Auth]
    summary: Resend OTP to phone number
    operationId: resendOTP
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [phone]
            properties:
              phone:
                type: string
                example: "01012345678"
    responses:
      "200":
        description: OTP resent
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOTPResponse"
      "404":
        description: User not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

/user/auth/verify-email:
  post:
    tags: [User Auth]
    summary: Verify email address
    operationId: verifyEmail
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [token]
            properties:
              token:
                type: string
    responses:
      "200":
        description: Email verified
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageResponse"
