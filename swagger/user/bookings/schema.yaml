BookingSummary:
  type: object
  properties:
    id:
      type: string
      format: uuid
    doctor:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        specialization:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        rating:
          type: number
        isVerified:
          type: boolean
    sessionType:
      type: string
      enum: [VIDEO, AUDIO, TEXT]
    duration:
      type: integer
      enum: [30, 45, 60]
    price:
      type: number
      format: float
    status:
      type: string
      enum: [PENDING, CONFIRMED, COMPLETED, CANCELLED]
    scheduledYear:
      type: integer
      nullable: true
    scheduledMonth:
      type: integer
      nullable: true
    scheduledDay:
      type: integer
      nullable: true
    scheduledTime:
      type: string
      nullable: true
    completedAt:
      type: string
      format: date-time
      nullable: true
    cancelledAt:
      type: string
      format: date-time
      nullable: true
    rating:
      type: integer
      nullable: true
    review:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time

BookingDetail:
  allOf:
    - $ref: "#/components/schemas/BookingSummary"
    - type: object
      properties:
        childId:
          type: string
          nullable: true
        child:
          nullable: true
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            profileImage:
              type: string
              nullable: true
        cancellationReason:
          type: string
          nullable: true
        videoLink:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time

BookingCreatedResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    doctor:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        specialization:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
    sessionType:
      type: string
      enum: [VIDEO, AUDIO, TEXT]
    duration:
      type: integer
    price:
      type: number
    status:
      type: string
      example: PENDING
    scheduledYear:
      type: integer
    scheduledMonth:
      type: integer
    scheduledDay:
      type: integer
    scheduledTime:
      type: string
    createdAt:
      type: string
      format: date-time

CreateBookingRequest:
  type: object
  required: [doctorId, sessionType, duration, scheduledYear, scheduledMonth, scheduledDay, scheduledTime]
  properties:
    doctorId:
      type: string
      format: uuid
    childId:
      type: string
      format: uuid
      nullable: true
    sessionType:
      type: string
      enum: [VIDEO, AUDIO, TEXT]
    duration:
      type: integer
      enum: [30, 45, 60]
      description: Session duration in minutes
    scheduledYear:
      type: integer
      minimum: 2024
      maximum: 2100
      description: The calendar year of the scheduled session
      example: 2026
    scheduledMonth:
      type: integer
      minimum: 1
      maximum: 12
      description: Used together with scheduledYear, scheduledDay, and scheduledTime
    scheduledDay:
      type: integer
      minimum: 1
      maximum: 31
    scheduledTime:
      type: string
      description: "Format: HH:MM AM/PM"
      example: "10:00 AM"
    notes:
      type: string
      nullable: true

RescheduleBookingRequest:
  type: object
  required: [scheduledYear, scheduledMonth, scheduledDay, scheduledTime]
  properties:
    scheduledYear:
      type: integer
      minimum: 2024
      maximum: 2100
    scheduledMonth:
      type: integer
      minimum: 1
      maximum: 12
    scheduledDay:
      type: integer
      minimum: 1
      maximum: 31
    scheduledTime:
      type: string
      example: "02:30 PM"
