/admin/mahara/categories:
  get:
    tags: [Admin Mahara]
    summary: Get all activity categories
    operationId: adminGetActivityCategories
    security:
      - BearerAuth: []
    responses:
      "200":
        description: Activity categories
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/ActivityCategory"
  post:
    tags: [Admin Mahara]
    summary: Create activity category
    operationId: adminCreateActivityCategory
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name:
                type: string
    responses:
      "201":
        description: Category created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/ActivityCategory"

