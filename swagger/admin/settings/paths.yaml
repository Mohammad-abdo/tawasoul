/admin/settings:
  get:
    tags: [Admin Settings]
    summary: Get app settings
    operationId: adminGetSettings
    security:
      - BearerAuth: []
    description: Returns the singleton app settings record, creating defaults if none exist.
    responses:
      "200":
        description: App settings
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AppSettings"
  put:
    tags: [Admin Settings]
    summary: Update app settings
    operationId: adminUpdateSettings
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateAppSettingsRequest"
    responses:
      "200":
        description: Settings updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "#/components/schemas/AppSettings"
