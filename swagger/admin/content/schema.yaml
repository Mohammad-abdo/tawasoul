HomeSlider:
  type: object
  properties:
    id:
      type: string
    titleAr:
      type: string
      nullable: true
    titleEn:
      type: string
      nullable: true
    descriptionAr:
      type: string
      nullable: true
    descriptionEn:
      type: string
      nullable: true
    image:
      type: string
    buttonText:
      type: string
      nullable: true
    buttonLink:
      type: string
      nullable: true
    order:
      type: integer
    isActive:
      type: boolean
    createdAt:
      type: string
      format: date-time

HomeSliderRequest:
  type: object
  properties:
    titleAr:
      type: string
    titleEn:
      type: string
    descriptionAr:
      type: string
    descriptionEn:
      type: string
    image:
      type: string
      format: binary
      description: Image file upload (or provide `image` URL as string)
    buttonText:
      type: string
    buttonLink:
      type: string
    order:
      type: integer
    isActive:
      type: boolean

