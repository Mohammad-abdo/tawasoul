AdminOnboarding:
  type: object
  properties:
    id:
      type: string
    title:
      type: string
    titleAr:
      type: string
    description:
      type: string
      nullable: true
    descriptionAr:
      type: string
      nullable: true
    image:
      type: string
      nullable: true
    order:
      type: integer
    isActive:
      type: boolean
    platform:
      type: string
      enum: [ALL, MOBILE, WEB]
    createdAt:
      type: string
      format: date-time

OnboardingRequest:
  type: object
  properties:
    title:
      type: string
    titleAr:
      type: string
    description:
      type: string
    descriptionAr:
      type: string
    image:
      type: string
      format: binary
    order:
      type: integer
    isActive:
      type: boolean
    platform:
      type: string
      enum: [ALL, MOBILE, WEB]
      default: ALL

AdminPageContent:
  type: object
  properties:
    id:
      type: string
    pageType:
      type: string
      enum: [PRIVACY_POLICY, TERMS_AND_CONDITIONS, ABOUT_APP, COMMUNITY_GUIDELINES, HELP_CENTER]
    titleAr:
      type: string
    titleEn:
      type: string
    contentAr:
      type: string
    contentEn:
      type: string
    lastUpdatedBy:
      type: string
      nullable: true
    lastUpdatedByAdmin:
      type: object
      nullable: true
      properties:
        id:
          type: string
        name:
          type: string
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
