AgoraTokenRequest:
  type: object
  required:
    - bookingId
  properties:
    bookingId:
      type: string
      example: clz_booking_123

AgoraTokenPayload:
  type: object
  properties:
    token:
      type: string
      example: 006xxxx
    channelName:
      type: string
      example: clz_booking_123
    uid:
      type: integer
      example: 42137
    appId:
      type: string
      example: 1a2b3c4d5e6f7g8h9i
    expiresIn:
      type: integer
      example: 3600

AgoraTokenResponse:
  type: object
  properties:
    success:
      type: boolean
      example: true
    data:
      $ref: '#/components/schemas/AgoraTokenPayload'
